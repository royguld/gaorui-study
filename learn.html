<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习舱</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./pod-template.css" />
    <style>
      .sidebar-link {
        display: block; color: #cfe3f5; text-decoration: none; font-size: 13px;
        background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 7px; padding: 10px 12px;
      }
      .sidebar-link:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }
      .missing { padding: 60px 24px; text-align: center; font-family: inherit; }
      .missing a { color: #0f9f9a; }
    </style>
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" id="brandMark">学</div>
          <div>
            <h1 id="brandTitle">学习舱</h1>
            <p id="brandSub"></p>
          </div>
        </div>

        <nav class="subject-nav" aria-label="科目导航"></nav>

        <a class="sidebar-link" href="./home.html">⇄ 切换孩子 · 返回起始页</a>
        <a class="sidebar-link" id="reportLink" href="./report.html">学习报告 · 给家长看</a>

        <div class="sidebar-note">
          <span>今日原则</span>
          <strong>学一点，测一下，明早复核。</strong>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="date-line" id="dateLine"></p>
            <h2 id="topGreeting">把今天的学习节奏跑起来</h2>
          </div>
          <div class="progress-card">
            <span>计划进度</span>
            <strong id="progressDays">—</strong>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            <p class="streak-line" id="streakLine"></p>
          </div>
        </header>

        <section class="dashboard-grid">
          <section class="panel today-panel">
            <div class="section-title">
              <h3>今日任务</h3>
              <span>完成后点亮</span>
            </div>
            <div class="task-list" id="taskList"></div>
          </section>

          <section class="panel map-panel">
            <div class="section-title">
              <h3>科目闯关地图</h3>
              <span id="subjectSummary"></span>
            </div>
            <div class="quest-map" id="questMap"></div>
          </section>

          <section class="panel lesson-panel">
            <div class="lesson-header">
              <div>
                <span id="lessonSubject"></span>
                <h3 id="lessonTitle"></h3>
              </div>
              <div class="lesson-actions">
                <button class="ghost-button" id="playLesson">播放讲解</button>
                <button class="ghost-button" id="speakLesson">朗读讲解</button>
                <button class="ghost-button" id="markDone">标记已学</button>
              </div>
            </div>
            <p class="one-line" id="lessonOneLine"></p>
            <div class="narration-card">
              <div class="narration-top">
                <span id="animationLabel">分步讲解</span>
                <div class="mini-progress"><div id="animationProgress"></div></div>
              </div>
              <p id="narrationText"></p>
            </div>
            <div class="concept-box" id="conceptBox"></div>
            <h4 class="term-title">本节关键词</h4>
            <div class="term-strip" id="termStrip"></div>
            <div class="lesson-columns">
              <div>
                <h4>生活例子</h4>
                <p id="lessonExample"></p>
              </div>
              <div>
                <h4>易错提醒</h4>
                <p id="mistakeText"></p>
              </div>
            </div>
            <div class="review-block">
              <h4>明天复核</h4>
              <ul id="reviewPoints"></ul>
            </div>
          </section>

          <section class="panel quiz-panel">
            <div class="section-title">
              <h3>今日小测</h3>
              <span>提交后立刻判分</span>
            </div>
            <div id="quizBox"></div>
            <button class="primary-button" id="submitQuiz">提交小测</button>
            <p class="quiz-result" id="quizResult"></p>
          </section>

          <section class="panel review-panel">
            <div class="section-title">
              <h3>明早复核队列</h3>
              <span>错题自动收集</span>
            </div>
            <ol id="reviewQueue"></ol>
          </section>
        </section>
      </main>
    </div>

    <script src="./auth.js"></script>
    <script>
      /* 从本机家庭档案读取该孩子的课程，注入 LEARNING_DATA 供运行时渲染 */
      (function () {
        "use strict";
        function fail(msg) {
          document.body.innerHTML =
            '<div class="missing"><h2>' + msg + '</h2><p><a href="./home.html">← 返回起始页选择孩子</a></p></div>';
        }
        var id = new URLSearchParams(location.search).get("child");
        if (!id) { fail("没有指定孩子"); return; }
        var children = [];
        try { children = JSON.parse(localStorage.getItem("family:children") || "[]"); } catch (e) { /* 忽略 */ }
        var child = null;
        for (var i = 0; i < children.length; i++) {
          if (children[i].podId === id) { child = children[i]; break; }
        }
        if (!child) { fail("在本设备上没有找到这个孩子的学习舱"); return; }
        window.LEARNING_DATA = child;
        var name = child.student.name || "学";
        document.title = name + "学习舱";
        document.getElementById("brandMark").textContent = name[0];
        document.getElementById("brandTitle").textContent = name + "学习舱";
        document.getElementById("brandSub").textContent = child.student.grade + " · " + child.student.goal;
        document.getElementById("reportLink").href = "./report.html?child=" + encodeURIComponent(child.podId);
      })();
    </script>
    <script src="./quiz-engine.js"></script>
    <script src="./pod-runtime.js"></script>
  </body>
</html>
