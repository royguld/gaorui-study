<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__POD_TITLE__</title>
    <link rel="icon" href="data:," />
    <style>
__POD_CSS__
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">__POD_MARK__</div>
          <div>
            <h1>__POD_TITLE__</h1>
            <p>__POD_SUBTITLE__</p>
          </div>
        </div>

        <nav class="subject-nav" aria-label="科目导航"></nav>

        <div class="sidebar-note">
          <span>今日原则</span>
          <strong>学一点，测一下，明早复核。</strong>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="date-line" id="dateLine"></p>
            <h2 id="topGreeting">把今天的学习节奏跑起来</h2>
          </div>
          <div class="progress-card">
            <span>计划进度</span>
            <strong id="progressDays">—</strong>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            <p class="streak-line" id="streakLine"></p>
          </div>
        </header>

        <section class="dashboard-grid">
          <section class="panel today-panel">
            <div class="section-title">
              <h3>今日任务</h3>
              <span>完成后点亮</span>
            </div>
            <div class="task-list" id="taskList"></div>
          </section>

          <section class="panel map-panel">
            <div class="section-title">
              <h3>科目闯关地图</h3>
              <span id="subjectSummary"></span>
            </div>
            <div class="quest-map" id="questMap"></div>
          </section>

          <section class="panel lesson-panel">
            <div class="lesson-header">
              <div>
                <span id="lessonSubject"></span>
                <h3 id="lessonTitle"></h3>
              </div>
              <div class="lesson-actions">
                <button class="ghost-button" id="playLesson">播放讲解</button>
                <button class="ghost-button" id="speakLesson">朗读讲解</button>
                <button class="ghost-button" id="markDone">标记已学</button>
              </div>
            </div>
            <p class="one-line" id="lessonOneLine"></p>
            <div class="narration-card">
              <div class="narration-top">
                <span id="animationLabel">分步讲解</span>
                <div class="mini-progress"><div id="animationProgress"></div></div>
              </div>
              <p id="narrationText"></p>
            </div>
            <div class="concept-box" id="conceptBox"></div>
            <h4 class="term-title">本节关键词</h4>
            <div class="term-strip" id="termStrip"></div>
            <div class="lesson-columns">
              <div>
                <h4>生活例子</h4>
                <p id="lessonExample"></p>
              </div>
              <div>
                <h4>易错提醒</h4>
                <p id="mistakeText"></p>
              </div>
            </div>
            <div class="review-block">
              <h4>明天复核</h4>
              <ul id="reviewPoints"></ul>
            </div>
          </section>

          <section class="panel quiz-panel">
            <div class="section-title">
              <h3>今日小测</h3>
              <span>提交后立刻判分</span>
            </div>
            <div id="quizBox"></div>
            <button class="primary-button" id="submitQuiz">提交小测</button>
            <p class="quiz-result" id="quizResult"></p>
          </section>

          <section class="panel review-panel">
            <div class="section-title">
              <h3>明早复核队列</h3>
              <span>错题自动收集</span>
            </div>
            <ol id="reviewQueue"></ol>
          </section>
        </section>
      </main>
    </div>

    <script>
__POD_SCRIPT__
    </script>
  </body>
</html>
